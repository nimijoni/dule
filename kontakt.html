document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle=\"padding:64px 46px 8px; text-align:center;\">\n    <span style=\"display:inline-flex; align-items:center; gap:8px; font-size:13px; font-weight:700; color:#2f6fd0; background:#eaf1fc; padding:8px 14px; border-radius:999px;\">Kako izgleda obuka<\u002Fspan>\n    <h1 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:44px; line-height:1.1; letter-spacing:-0.02em; color:#12233f; margin:20px auto 0; max-width:720px;\">Prvi razgovor je besplatan — bez obaveza, bez pritiska.<\u002Fh1>\n    <p style=\"font-size:17px; line-height:1.6; color:#51617a; max-width:600px; margin:18px auto 0;\">Javi nam se, ispričaj nam gde si sa vožnjom (čak i ako si tek na \"nikad nisam sela za volan\") i predložićemo ti plan koji ti odgovara.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- STEPS: how training looks -->\n  <div style=\"padding:48px 46px 60px;\">\n    <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:18px;\">\n      <div style=\"background:#f6f9fd; border-radius:16px; padding:26px;\">\n        <div style=\"width:40px; height:40px; border-radius:12px; background:#eaf1fc; color:#2f6fd0; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px;\">1<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px; color:#12233f; margin:16px 0 6px;\">Prijava i razgovor<\u002Fh3>\n        <p style=\"font-size:13.5px; line-height:1.6; color:#51617a; margin:0;\">Popuniš formu ili nas pozoveš — dogovorimo termin i odgovorimo na sva pitanja.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#f6f9fd; border-radius:16px; padding:26px;\">\n        <div style=\"width:40px; height:40px; border-radius:12px; background:#eaf1fc; color:#2f6fd0; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px;\">2<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px; color:#12233f; margin:16px 0 6px;\">Teorijska nastava<\u002Fh3>\n        <p style=\"font-size:13.5px; line-height:1.6; color:#51617a; margin:0;\">Jasna predavanja, bez žurbe. Sve objašnjeno razumljivim jezikom.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#f6f9fd; border-radius:16px; padding:26px;\">\n        <div style=\"width:40px; height:40px; border-radius:12px; background:#eaf1fc; color:#2f6fd0; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px;\">3<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px; color:#12233f; margin:16px 0 6px;\">Praktična vožnja<\u002Fh3>\n        <p style=\"font-size:13.5px; line-height:1.6; color:#51617a; margin:0;\">Isti instruktor, tvoj tempo. Dodatni časovi kad god zatreba.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#f6f9fd; border-radius:16px; padding:26px;\">\n        <div style=\"width:40px; height:40px; border-radius:12px; background:#eaf1fc; color:#2f6fd0; display:flex; align-items:center; justify-content:center; font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px;\">4<\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px; color:#12233f; margin:16px 0 6px;\">Priprema za ispit<\u002Fh3>\n        <p style=\"font-size:13.5px; line-height:1.6; color:#51617a; margin:0;\">Vežbamo tremu i situacije sa ispita — izlaziš siguran, ne uplašen.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- CONTACT FORM + INFO -->\n  <div id=\"prijava\" style=\"display:grid; grid-template-columns:1.1fr 0.9fr; gap:0; background:#123a6b; color:#fff;\">\n    <div style=\"padding:56px 46px;\">\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:28px; margin:0 0 8px; letter-spacing:-0.01em;\">Pošalji nam prijavu<\u002Fh2>\n      <p style=\"font-size:15px; color:#c3d2e6; margin:0 0 28px;\">Odgovaramo istog dana. Nema obaveze upisa.<\u002Fp>\n\n      <dc-import name=\"ContactForm\" hint-size=\"100%,520px\"><\u002Fdc-import>\n    <\u002Fdiv>\n\n    <div style=\"padding:56px 46px; background:#0e2c52;\">\n      <h3 style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:19px; margin:0 0 20px; color:#f4b942;\">Ili nas kontaktiraj direktno<\u002Fh3>\n\n      <div style=\"margin-bottom:24px;\">\n        <div style=\"font-weight:700; font-size:16px;\">Kruševac<\u002Fdiv>\n        <div style=\"color:#c3d2e6; font-size:14.5px; line-height:1.7; margin-top:4px;\">Slobodana Jovanovića 6<br>060 6 037 037<br>autoskoladule@gmail.com<br>pon–pet 09–17h · sub 09–14h<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-bottom:24px;\">\n        <div style=\"font-weight:700; font-size:16px;\">Varvarin<\u002Fdiv>\n        <div style=\"color:#c3d2e6; font-size:14.5px; line-height:1.7; margin-top:4px;\">Slobode 94<br>060 6 037 037<br>autoskoladule@gmail.com<br>pon–pet 08–15h<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:20px; margin-top:30px; padding-top:24px; border-top:1px solid rgba(255,255,255,0.12);\">\n        <div><div style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:20px;\">4.9<span style=\"color:#f4b942; font-size:14px;\">★<\u002Fspan><\u002Fdiv><div style=\"font-size:12px; color:#93a4c1;\">270+ ocena<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:20px;\">#1<\u002Fdiv><div style=\"font-size:12px; color:#93a4c1;\">u regionu<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:20px;\">80%<\u002Fdiv><div style=\"font-size:12px; color:#93a4c1;\">na preporuku<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:20px 46px; background:#0a2242; color:#6f86ad; font-size:12px;\">Auto škola Dule · Kruševac · 2026<\u002Fdiv>\n<\u002Fsecti
